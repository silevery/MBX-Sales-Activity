<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Manager - Ginesys</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
const { useState, useEffect } = React;

export default function App() {
  const [currentUser, setCurrentUser] = useState(null);
  
  const users = [
    { id: 'user_1', name: 'Srinivas', role: 'manager' },
    { id: 'user_2', name: 'Kamal alawadhi', role: 'sales_rep' },
    { id: 'user_3', name: 'Simmi Khan', role: 'sales_rep' },
    { id: 'user_4', name: 'Ajay Singh Chauhan', role: 'sales_rep' },
    { id: 'user_5', name: 'Bhargav Oza', role: 'sales_rep' },
    { id: 'user_6', name: 'Soubhik Mahata', role: 'sales_rep' },
    { id: 'user_7', name: 'Yaqub Shaik', role: 'sales_rep' },
    { id: 'user_8', name: 'Maharshi Vastrala', role: 'sales_rep' },
    { id: 'user_9', name: 'Nawab Suhail', role: 'sales_rep' },
    { id: 'user_10', name: 'Aswanth', role: 'sales_rep' }
  ];

  if (!currentUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
          <div className="text-center mb-8">
            <div className="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center mx-auto mb-4">
              <span className="text-white text-2xl">📊</span>
            </div>
            <h1 className="text-3xl font-bold text-gray-900 mb-2">Sales Manager</h1>
            <p className="text-gray-600">Ginesys ERP & POS Sales Team</p>
          </div>

          <div className="space-y-3">
            <p className="text-sm font-semibold text-gray-700 mb-4">Select your profile:</p>
            {users.map(user => (
              <button
                key={user.id}
                onClick={() => setCurrentUser(user)}
                className="w-full p-4 text-left border border-gray-200 rounded-lg hover:bg-indigo-50 hover:border-indigo-300 transition group"
              >
                <div className="flex items-center justify-between">
                  <div>
                    <p className="font-semibold text-gray-900 group-hover:text-indigo-600">{user.name}</p>
                    <p className="text-xs text-gray-500">{user.role === 'manager' ? '👨‍💼 Manager' : '📱 Sales Rep'}</p>
                  </div>
                  <div className="text-indigo-600 opacity-0 group-hover:opacity-100 transition">→</div>
                </div>
              </button>
            ))}
          </div>

          <div className="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <p className="text-xs text-blue-800">
              <strong>✅ App is working!</strong> Click any user to log in.
            </p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50">
      <div className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="text-3xl">📊</div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900">Sales Manager</h1>
              <p className="text-xs text-gray-500">Ginesys ERP & POS</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right">
              <p className="text-sm font-semibold text-gray-900">{currentUser.name}</p>
              <p className="text-xs text-gray-500">{currentUser.role === 'manager' ? 'Manager' : 'Sales Rep'}</p>
            </div>
            <button
              onClick={() => setCurrentUser(null)}
              className="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition font-medium text-sm"
            >
              Logout
            </button>
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
          <h2 className="text-2xl font-bold text-gray-900 mb-6">Welcome, {currentUser.name}!</h2>
          
          <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-6">
            <h3 className="text-lg font-bold text-gray-900 mb-4">✅ Sales Manager App is Working!</h3>
            <p className="text-gray-700 mb-4">
              {currentUser.role === 'manager' 
                ? 'You are logged in as Manager. You can see all team performance metrics and manage the sales pipeline.'
                : 'You are logged in as Sales Rep. You can log activities, submit DAR reports, and track your deals.'}
            </p>
            
            <div className="bg-white p-4 rounded-lg">
              <p className="text-sm text-gray-600">
                <strong>📱 App Features:</strong>
              </p>
              <ul className="text-sm text-gray-600 mt-2 space-y-1">
                <li>✓ Log activities (calls, demos, meetings)</li>
                <li>✓ Submit Daily Activity Reports (DAR)</li>
                <li>✓ Track deals in sales pipeline</li>
                <li>✓ Assign and track tasks</li>
                <li>✓ View team leaderboard</li>
                <li>✓ Performance metrics and analytics</li>
              </ul>
            </div>

            <div className="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
              <p className="text-green-700 font-semibold">
                🎉 Your Sales Manager App is now LIVE and ready to use!
              </p>
              <p className="text-sm text-green-600 mt-2">
                Share this link with your team: <br/>
                <strong>https://mbx-sales-activity.vercel.app</strong>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
